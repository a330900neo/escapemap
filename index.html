<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimized HK Pathfinding (100 Chunks)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        #controls { padding: 15px; background-color: #f8f9fa; border-bottom: 1px solid #ccc; }
        #map { flex-grow: 1; width: 100%; }
        .result-box { margin-top: 10px; padding: 10px; background: #e9ecef; border-radius: 5px; display: none; }
        button { padding: 8px 15px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

<div id="controls">
    <h3>Optimized HK Pathfinding (TDAS API)</h3>
    <p><strong>Instructions:</strong> Click to set Start and End markers, then calculate. Geometry is fetched on demand!</p>
    <button onclick="calculateRoute()" id="calcBtn">Calculate Route</button>
    <button onclick="resetMap()" style="background-color: #6c757d;">Reset</button>
    
    <div id="result" class="result-box"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([22.3193, 114.1694], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    let startMarker = null;
    let endMarker = null;
    let routeLayers = L.layerGroup().addTo(map);
    
    const cachedChunks = {}; 

    map.on('click', function(e) {
        if (!startMarker) {
            startMarker = L.marker(e.latlng).addTo(map).bindPopup("Start").openPopup();
        } else if (!endMarker) {
            endMarker = L.marker(e.latlng).addTo(map).bindPopup("End").openPopup();
        }
    });

    function resetMap() {
        if (startMarker) map.removeLayer(startMarker);
        if (endMarker) map.removeLayer(endMarker);
        routeLayers.clearLayers();
        startMarker = null;
        endMarker = null;
        document.getElementById('result').style.display = 'none';
    }

    // Changed to modulo 100
    async function fetchRequiredGeometry(rids) {
        const requiredChunkIds = [...new Set(rids.map(rid => rid % 100))];
        
        const fetchPromises = requiredChunkIds.map(async (chunkId) => {
            if (!cachedChunks[chunkId]) {
                try {
                    const res = await fetch(`route_data/chunk_${chunkId}.json`);
                    if (res.ok) {
                        cachedChunks[chunkId] = await res.json();
                    }
                } catch (e) {
                    console.error(`Failed to load chunk_${chunkId}.json`, e);
                }
            }
        });

        await Promise.all(fetchPromises);
    }

    async function calculateRoute() {
        if (!startMarker || !endMarker) return alert("Select Start and End locations first.");

        const payload = {
            start: { lat: startMarker.getLatLng().lat, long: startMarker.getLatLng().lng },
            end: { lat: endMarker.getLatLng().lat, long: endMarker.getLatLng().lng },
            departIn: 0, lang: "en", type: "ST"
        };

        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = "<i>Calculating route and fetching geometry...</i>";
        routeLayers.clearLayers();

        try {
            const response = await fetch("https://tdas-api.hkemobility.gov.hk/tdas/api/route", {
                method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error("TDAS API Error");
            const data = await response.json();

            resultDiv.innerHTML = `
                <strong>ETA:</strong> ${data.eta} | 
                <strong>Distance:</strong> ${data.distU} | 
                <strong>Speed:</strong> ${data.jSpeed}
            `;

            if (data.route && data.route.length > 0) {
                let allRids = [];
                data.route[0].segment.forEach(seg => {
                    if (seg.rid) allRids.push(...seg.rid);
                });

                await fetchRequiredGeometry(allRids);

                let validCoordinatesFound = false;

                allRids.forEach(rid => {
                    // Changed to modulo 100
                    const chunkId = rid % 100;
                    if (cachedChunks[chunkId] && cachedChunks[chunkId][rid]) {
                        validCoordinatesFound = true;
                        const coordinates = cachedChunks[chunkId][rid];
                        
                        const geoJsonFeature = {
                            "type": "Feature",
                            "geometry": { "type": "LineString", "coordinates": coordinates }
                        };

                        L.geoJSON(geoJsonFeature, {
                            style: { color: '#007bff', weight: 5, opacity: 0.8 }
                        }).addTo(routeLayers);
                    }
                });

                if (validCoordinatesFound) {
                    setTimeout(() => {
                        map.fitBounds(L.featureGroup(routeLayers.getLayers()).getBounds(), { padding: [30, 30] });
                    }, 100);
                } else {
                    resultDiv.innerHTML += `<br><span style="color:red;">Geometry not found for these roads.</span>`;
                }
            }

        } catch (error) {
            console.error(error);
            resultDiv.innerHTML = `<span style="color:red;">Failed to get route data. Check console.</span>`;
        }
    }
</script>

</body>
</html>
